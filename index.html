<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>審核註冊申請</title>
  <style>
  body {
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 10px;
    background-color: #f4f7f6;
  }
  h2, h3 {
    text-align: center;
    color: #333;
  }
  .entry {
    background: white;
    border: 1px solid #ddd;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .school-tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: #f9f9f9;
    padding: 10px;
    border-radius: 8px;
    margin-top: 5px;
  }
  .school-tag-container label {
    font-size: 14px;
    background: #fff;
    border: 1px solid #ccc;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .school-tag-container input {
    margin-right: 5px;
  }
  button {
    margin-top: 10px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 5px;
    border: 1px solid #ddd;
  }
  .btn-approve { background-color: #4CAF50; color: white; border: none; }
  .btn-save { background-color: #2196F3; color: white; border: none; }
  .danger { color: red; border-color: red; background: white; }
  .danger:hover { background: #fff1f1; }

  #login-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 50px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  #login-section label { margin: 10px 0; font-size: 16px; }
  #login-section input {
    padding: 10px;
    font-size: 16px;
    width: 250px;
    border: 1px solid #ddd;
    border-radius: 5px;
    margin-left: 10px;
  }
</style>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
  <h2>審核註冊申請</h2>

  <div id="login-section">
    <label>帳號：<input type="text" id="adminUser" /></label>
    <label>密碼：<input type="password" id="adminPass" /></label>
    <button class="btn-save" onclick="verifyPassword()">登入管理後台</button>
  </div>

  <div id="content" style="display:none">
    <p style="text-align: right;">👤 管理員：<span id="userEmail" style="font-weight:bold;"></span> <button onclick="location.reload()">登出</button></p>

    <hr>
    <h3>📥 待審核申請</h3>
    <div id="entries">載入中...</div>
    <div style="text-align: center;">
        <button class="danger" onclick="deleteAll()">⚠️ 一鍵刪除所有待審核資料</button>
    </div>

    <hr>
    <h3>👥 正式使用者權限管理</h3>
    <div id="accessUsers">載入中...</div>
  </div>

  <script>
    // 初始化主資料庫 (管理員驗證用)
    const firebaseConfig = {
      apiKey: "AIzaSyBCI-jpTVQou31yf6B7CnOXkF2lqfssSkc",
      authDomain: "chesolutionsignup.firebaseapp.com",
      databaseURL: "https://chesolutionsignup-default-rtdb.firebaseio.com",
      projectId: "chesolutionsignup"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 初始化外部資料庫 (抓取最新科目分類用)
    const accessApp = firebase.initializeApp({
      databaseURL: "https://access-7a3c3-default-rtdb.firebaseio.com/"
    }, "accessProject");
    const accessDb = firebase.database(accessApp);

    const getAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/getPendingUsers";
    const deleteAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/deletePendingUser";
    const approveAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/approveUserToAccessProject";
    const getAccessAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/getAllUsersFromAccess";
    const deleteAccessAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/deleteUserFromAccess";

    function verifyPassword() {
      const inputUser = document.getElementById("adminUser").value.trim();
      const inputPass = document.getElementById("adminPass").value.trim();

      db.ref("adminUsers/" + inputUser).once("value")
        .then(snapshot => {
          const data = snapshot.val();
          if (!data || data.password !== inputPass) {
            alert("帳號或密碼錯誤");
            return;
          }
          document.getElementById("login-section").style.display = "none";
          document.getElementById("content").style.display = "block";
          document.getElementById("userEmail").innerText = inputUser;
          loadData();
          loadAccessUsers();
        })
        .catch(err => {
          alert("登入錯誤：" + err.message);
        });
    }

    async function loadData() {
      try {
        const res = await fetch(getAPI);
        const data = await res.json();
        const container = document.getElementById("entries");
        container.innerHTML = "";

        if (!data || Object.keys(data).length === 0) {
          container.innerHTML = "<p style='text-align:center;'>✅ 目前沒有待審核資料</p>";
          return;
        }

        Object.entries(data).forEach(([key, entry]) => {
          const div = document.createElement("div");
          div.className = "entry";
          div.innerHTML = `
            <p><strong>申請帳號：</strong>${entry["申請帳號"]}</p>
            <p><strong>姓名：</strong>${entry["真實姓名"]} (${entry["Facebook資訊"]})</p>
            <p><strong>付款資訊：</strong>[${entry["付款方式"]}] ${entry["付款帳號資訊"]}</p>
            <p><strong>欲購買學校：</strong><span style="color:blue;">${(entry["選擇學校"] || []).join(", ")}</span></p>
            <p style="font-size:12px; color:gray;">送出時間：${entry["送出時間"] || "無"}</p>
            <button class="btn-approve" onclick='approve("${key}", ${JSON.stringify(entry)})'>✅ 同意並加入正式庫</button>
            <button class="danger" onclick='remove("${key}")'>🗑️ 刪除申請</button>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        alert("❌ 無法讀取待審核資料");
      }
    }

    async function loadAccessUsers() {
      try {
        // 同時抓取正式使用者與最新科目清單
        const [res, subjectsSnapshot] = await Promise.all([
          fetch(getAccessAPI),
          accessDb.ref("subjects").once("value")
        ]);
        
        const data = await res.json();
        const subjectsData = subjectsSnapshot.val() || {};
        
        // 自動從資料庫 subjects 節點提取所有 Key
        const allDynamicSchools = Object.keys(subjectsData);
        
        const container = document.getElementById("accessUsers");
        container.innerHTML = "";

        if (!data || Object.keys(data).length === 0) {
          container.innerHTML = "<p style='text-align:center;'>✅ 目前無正式使用者</p>";
          return;
        }

        const sortedUsers = Object.entries(data).sort(([a], [b]) => a.localeCompare(b));

        sortedUsers.forEach(([username, user]) => {
          const div = document.createElement("div");
          div.className = "entry";
          const purchasedSet = new Set(Object.keys(user.purchased || {}));
          
          // 動態生成 Checkboxes
          let schoolCheckboxes = allDynamicSchools.map(school => `
            <label>
              <input type="checkbox" name="edit-schools-${username}" value="${school}" ${purchasedSet.has(school) ? "checked" : ""}>
              ${school}
            </label>
          `).join("");

          div.innerHTML = `
            <p><strong>帳號：</strong> <input type="text" id="edit-user-${username}" value="${username}" style="width:150px;"></p>
            <p><strong>密碼：</strong> <input type="text" id="edit-pass-${username}" value="${user.password || ""}" style="width:150px;"></p>
            <div><strong>權限設定（勾選即代表購買）：</strong></div>
            <div class="school-tag-container">${schoolCheckboxes}</div>
            <p><strong>目前狀態：</strong>${user.isLoggedIn ? "<span style='color:green;'>🟢 在線中</span>" : "<span style='color:gray;'>⚫ 離線</span>"}</p>
            <button class="btn-save" onclick='confirmUpdateUser("${username}")'>💾 儲存變更</button>
            <button class="danger" onclick='deleteAccessUser("${username}")'>🗑️ 刪除帳號</button>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error("載入使用者失敗", err);
      }
    }

    async function approve(key, entry) {
      const payload = {
        username: entry["申請帳號"],
        password: entry["申請密碼"],
        schools: entry["選擇學校"]
      };
      try {
        const res = await fetch(approveAPI, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || "審核失敗");
        alert("✅ 使用者已成功加入正式庫");
        await remove(key);
        loadAccessUsers();
      } catch (err) {
        alert("❌ 錯誤：" + err.message);
      }
    }

    async function remove(key) {
      try {
        await fetch(deleteAPI, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key })
        });
        loadData();
      } catch (err) {
        alert("❌ 刪除失敗");
      }
    }

    async function deleteAll() {
      if (!confirm("⚠️ 確定刪除所有申請資料？")) return;
      const res = await fetch(getAPI);
      const data = await res.json();
      if (!data) return;
      for (const key of Object.keys(data)) {
        await remove(key);
      }
    }

    async function confirmUpdateUser(originalUsername) {
      if (!confirm("確定要儲存變更？")) return;
      const newUsername = document.getElementById("edit-user-" + originalUsername).value.trim();
      const newPassword = document.getElementById("edit-pass-" + originalUsername).value.trim();
      const schoolInputs = document.querySelectorAll(`input[name="edit-schools-${originalUsername}"]:checked`);
      const newSchools = Array.from(schoolInputs).map(input => input.value);

      const payload = { originalUsername, newUsername, newPassword, newSchools };

      try {
        const res = await fetch("https://us-central1-chesolutionsignup.cloudfunctions.net/updateAccessUserInfo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("更新失敗");
        alert("✅ 資料更新成功");
        loadAccessUsers();
      } catch (err) {
        alert("❌ 更新出錯：" + err.message);
      }
    }

    async function deleteAccessUser(username) {
      if (!confirm(`⚠️ 確定要永久刪除使用者 ${username} 嗎？`)) return;
      try {
        await fetch(deleteAccessAPI, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username })
        });
        alert("✅ 已刪除帳號");
        loadAccessUsers();
      } catch (err) {
        alert("❌ 刪除失敗");
      }
    }
  </script>
</body>
</html>
