<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>審核註冊申請 - 批次管理版</title>
  <style>
  body {
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 10px;
    background-color: #f4f7f6;
  }
  h2, h3 {
    text-align: center;
    color: #333;
  }
  .entry {
    background: white;
    border: 1px solid #ddd;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    position: relative;
  }
  .school-tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: #f9f9f9;
    padding: 10px;
    border-radius: 8px;
    margin-top: 5px;
  }
  .school-tag-container label {
    font-size: 14px;
    background: #fff;
    border: 1px solid #ccc;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .school-tag-container input {
    margin-right: 5px;
  }
  .sticky-header {
    position: sticky;
    top: 0;
    background: #f4f7f6;
    padding: 10px 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    gap: 20px;
    border-bottom: 2px solid #ddd;
  }
  button {
    margin-top: 10px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 5px;
    border: 1px solid #ddd;
  }
  .btn-approve { background-color: #4CAF50; color: white; border: none; }
  .btn-save { background-color: #2196F3; color: white; border: none; }
  .btn-bulk-save { 
    background-color: #ff9800; 
    color: white; 
    border: none; 
    font-weight: bold;
    padding: 12px 24px;
    font-size: 16px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .danger { color: red; border-color: red; background: white; }
  .danger:hover { background: #fff1f1; }

  #login-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 50px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  #login-section label { margin: 10px 0; font-size: 16px; }
  #login-section input {
    padding: 10px;
    font-size: 16px;
    width: 250px;
    border: 1px solid #ddd;
    border-radius: 5px;
    margin-left: 10px;
  }
</style>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
  <h2>審核註冊申請</h2>

  <div id="login-section">
    <label>帳號：<input type="text" id="adminUser" /></label>
    <label>密碼：<input type="password" id="adminPass" /></label>
    <button class="btn-save" onclick="verifyPassword()">登入管理後台</button>
  </div>

  <div id="content" style="display:none">
    <div class="sticky-header">
        <button class="btn-bulk-save" onclick="saveAllChanges()">🚀 一鍵儲存所有使用者變更</button>
        <button onclick="location.reload()">🔄 重新載入/登出</button>
    </div>

    <p style="text-align: right;">👤 管理員：<span id="userEmail" style="font-weight:bold;"></span></p>

    <hr>
    <h3>📥 待審核申請</h3>
    <div id="entries">載入中...</div>
    <div style="text-align: center;">
        <button class="danger" onclick="deleteAll()">⚠️ 一鍵刪除所有待審核資料</button>
    </div>

    <hr>
    <h3>👥 正式使用者權限管理</h3>
    <div id="accessUsers">載入中...</div>
  </div>

  <script>
    // 初始化主資料庫
    const firebaseConfig = {
      apiKey: "AIzaSyBCI-jpTVQou31yf6B7CnOXkF2lqfssSkc",
      authDomain: "chesolutionsignup.firebaseapp.com",
      databaseURL: "https://chesolutionsignup-default-rtdb.firebaseio.com",
      projectId: "chesolutionsignup"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 初始化外部資料庫
    const accessApp = firebase.initializeApp({
      databaseURL: "https://access-7a3c3-default-rtdb.firebaseio.com/"
    }, "accessProject");
    const accessDb = firebase.database(accessApp);

    const getAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/getPendingUsers";
    const deleteAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/deletePendingUser";
    const approveAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/approveUserToAccessProject";
    const getAccessAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/getAllUsersFromAccess";
    const deleteAccessAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/deleteUserFromAccess";
    const updateAccessAPI = "https://us-central1-chesolutionsignup.cloudfunctions.net/updateAccessUserInfo";

    function verifyPassword() {
      const inputUser = document.getElementById("adminUser").value.trim();
      const inputPass = document.getElementById("adminPass").value.trim();
      db.ref("adminUsers/" + inputUser).once("value")
        .then(snapshot => {
          const data = snapshot.val();
          if (!data || data.password !== inputPass) {
            alert("帳號或密碼錯誤");
            return;
          }
          document.getElementById("login-section").style.display = "none";
          document.getElementById("content").style.display = "block";
          document.getElementById("userEmail").innerText = inputUser;
          loadData();
          loadAccessUsers();
        })
        .catch(err => alert("登入錯誤：" + err.message));
    }

    // 載入待審核資料
    async function loadData() {
      try {
        const res = await fetch(getAPI);
        const data = await res.json();
        const container = document.getElementById("entries");
        container.innerHTML = "";
        if (!data || Object.keys(data).length === 0) {
          container.innerHTML = "<p style='text-align:center;'>✅ 目前沒有待審核資料</p>";
          return;
        }
        Object.entries(data).forEach(([key, entry]) => {
          const div = document.createElement("div");
          div.className = "entry";
          div.innerHTML = `
            <p><strong>申請帳號：</strong>${entry["申請帳號"]}</p>
            <p><strong>姓名：</strong>${entry["真實姓名"]} (${entry["Facebook資訊"]})</p>
            <p><strong>付款：</strong>[${entry["付款方式"]}] ${entry["付款帳號資訊"]}</p>
            <p><strong>學校：</strong><span style="color:blue;">${(entry["選擇學校"] || []).join(", ")}</span></p>
            <button class="btn-approve" onclick='approve("${key}", ${JSON.stringify(entry)})'>✅ 同意</button>
            <button class="danger" onclick='remove("${key}")'>🗑️ 刪除</button>
          `;
          container.appendChild(div);
        });
      } catch (err) { alert("❌ 載入失敗"); }
    }

    // 載入正式使用者（含動態分類）
    async function loadAccessUsers() {
      try {
        const [res, subjectsSnapshot] = await Promise.all([
          fetch(getAccessAPI),
          accessDb.ref("subjects").once("value")
        ]);
        const data = await res.json();
        const subjectsData = subjectsSnapshot.val() || {};
        const allDynamicSchools = Object.keys(subjectsData);
        
        const container = document.getElementById("accessUsers");
        container.innerHTML = "";
        if (!data || Object.keys(data).length === 0) {
          container.innerHTML = "<p style='text-align:center;'>✅ 無正式使用者</p>";
          return;
        }

        const sortedUsers = Object.entries(data).sort(([a], [b]) => a.localeCompare(b));

        sortedUsers.forEach(([username, user]) => {
          const div = document.createElement("div");
          div.className = "entry user-config-card"; // 加 class 方便掃描
          div.setAttribute("data-original-username", username); // 紀錄原始帳號

          const purchasedSet = new Set(Object.keys(user.purchased || {}));
          let schoolCheckboxes = allDynamicSchools.map(school => `
            <label>
              <input type="checkbox" class="school-check" value="${school}" ${purchasedSet.has(school) ? "checked" : ""}>
              ${school}
            </label>
          `).join("");

          div.innerHTML = `
            <p><strong>帳號：</strong> <input type="text" class="edit-user" value="${username}" style="width:150px;"></p>
            <p><strong>密碼：</strong> <input type="text" class="edit-pass" value="${user.password || ""}" style="width:150px;"></p>
            <div><strong>權限設定：</strong></div>
            <div class="school-tag-container">${schoolCheckboxes}</div>
            <p style="font-size: 13px;">狀態：${user.isLoggedIn ? "🟢 在線" : "⚫ 離線"}</p>
            <button class="danger" onclick='deleteAccessUser("${username}")' style="position:absolute; top:10px; right:10px;">🗑️ 刪除</button>
          `;
          container.appendChild(div);
        });
      } catch (err) { console.error(err); }
    }

    // ⭐ 重點功能：一鍵儲存所有變更
    async function saveAllChanges() {
      const cards = document.querySelectorAll(".user-config-card");
      if (cards.length === 0) return;
      if (!confirm(`確定要儲存這 ${cards.length} 位使用者的變更嗎？`)) return;

      const btn = document.querySelector(".btn-bulk-save");
      const originalText = btn.innerText;
      btn.innerText = "⏳ 儲存中，請稍候...";
      btn.disabled = true;

      let successCount = 0;
      let failCount = 0;

      // 遍歷所有卡片進行更新
      for (const card of cards) {
        const originalUsername = card.getAttribute("data-original-username");
        const newUsername = card.querySelector(".edit-user").value.trim();
        const newPassword = card.querySelector(".edit-pass").value.trim();
        const schoolInputs = card.querySelectorAll(".school-check:checked");
        const newSchools = Array.from(schoolInputs).map(input => input.value);

        const payload = { originalUsername, newUsername, newPassword, newSchools };

        try {
          const res = await fetch(updateAccessAPI, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (res.ok) successCount++; else failCount++;
        } catch (err) {
          failCount++;
        }
      }

      alert(`儲存完成！\n成功：${successCount} 筆\n失敗：${failCount} 筆`);
      btn.innerText = originalText;
      btn.disabled = false;
      loadAccessUsers(); // 重新載入界面
    }

    // 審核同意
    async function approve(key, entry) {
      const payload = { username: entry["申請帳號"], password: entry["申請密碼"], schools: entry["選擇學校"] };
      try {
        const res = await fetch(approveAPI, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("審核失敗");
        alert("✅ 已加入正式庫");
        await remove(key);
        loadAccessUsers();
      } catch (err) { alert(err.message); }
    }

    async function remove(key) {
      await fetch(deleteAPI, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key })
      });
      loadData();
    }

    async function deleteAll() {
      if (!confirm("⚠️ 確定清空？")) return;
      const res = await fetch(getAPI);
      const data = await res.json();
      if (!data) return;
      for (const key of Object.keys(data)) await remove(key);
    }

    async function deleteAccessUser(username) {
      if (!confirm(`確定刪除 ${username}？`)) return;
      await fetch(deleteAccessAPI, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });
      loadAccessUsers();
    }
  </script>
</body>
</html>
